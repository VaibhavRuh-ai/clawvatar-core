<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Clawvatar</title>
<style>
:root{--bg:#08080e;--bg2:#10101a;--bg3:#1a1a28;--border:#222;--text:#ddd;--muted:#666;--accent:#7c6ef0;--green:#4ade80;--red:#f66;--blue:#60a5fa}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}

/* Layout */
.app{height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--bg2);padding:8px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);height:44px}
.topbar h1{font-size:14px;color:#fff;font-weight:700}.topbar h1 b{color:var(--accent)}
.topbar .spacer{flex:1}
.pill{font-size:9px;padding:2px 8px;border-radius:8px;font-weight:600;cursor:default}
.pill.off{background:#2a1515;color:var(--red)}.pill.on{background:#152a15;color:var(--green)}.pill.info{background:#15152a;color:var(--blue)}
nav{display:flex;gap:2px;margin-left:16px}
nav a{padding:6px 14px;font-size:11px;color:var(--muted);text-decoration:none;border-radius:6px;font-weight:600;cursor:pointer}
nav a.active{background:var(--bg3);color:var(--text)}
nav a:hover{color:var(--text)}

.content{flex:1;overflow-y:auto;padding:20px}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.card h2{font-size:13px;font-weight:700;margin-bottom:12px;color:var(--accent)}
.field{margin-bottom:10px}
.field label{display:block;font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-size:12px;outline:none;font-family:inherit}
.field input:focus,.field textarea:focus{border-color:var(--accent)}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;color:#fff;display:inline-block}
.btn-accent{background:var(--accent)}.btn-green{background:#22663a}.btn-red{background:#662230}
.btn-sm{padding:6px 12px;font-size:11px}
.btn+.btn{margin-left:6px}

/* Agent grid */
.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.agent-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:border-color .15s}
.agent-card:hover{border-color:var(--accent)}
.agent-card h3{font-size:13px;margin-bottom:6px}
.agent-card .meta{font-size:10px;color:var(--muted);line-height:1.6}
.agent-card .avatar-badge{width:36px;height:36px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:14px;float:right}

/* Call screen */
.call-layout{display:flex;height:calc(100vh - 44px);overflow:hidden}
.call-viewport{flex:1;position:relative;background:#0a0a12}
.call-viewport canvas{width:100%;height:100%;display:block}
.call-sidebar{width:340px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column}
.call-info{padding:12px;border-bottom:1px solid var(--border)}
.call-info h3{font-size:13px;margin-bottom:4px}
.call-info .meta{font-size:10px;color:var(--muted)}
.transcript{flex:1;overflow-y:auto;padding:12px}
.transcript .msg{padding:6px 10px;border-radius:8px;margin-bottom:6px;font-size:12px;max-width:85%}
.transcript .user{background:#2a2a44;margin-left:auto;text-align:right;border-bottom-right-radius:2px}
.transcript .agent{background:#1a2a1a;border-bottom-left-radius:2px}
.transcript .sys{color:var(--muted);font-size:10px;text-align:center}
.call-controls{padding:12px;border-top:1px solid var(--border);display:flex;justify-content:center;gap:10px}
.cbtn{width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cbtn svg{width:20px;height:20px;fill:#fff}
.cbtn.call{background:var(--green)}.cbtn.end{background:var(--red)}.cbtn.mic{background:#333}
.cbtn.mic.muted{background:var(--red)}
.hud{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.6);padding:4px 8px;border-radius:6px;font:10px/1.6 monospace;color:#555;pointer-events:none}
.hud b{color:var(--green)}

/* Upload */
.upload-zone{border:2px dashed var(--border);border-radius:8px;padding:16px;text-align:center;cursor:pointer;color:var(--muted);font-size:11px}
.upload-zone:hover{border-color:var(--accent)}
input[type=file]{display:none}

/* Status */
.status-row{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.status-row .k{color:var(--muted)}.status-row .v{color:var(--text)}

/* Hidden pages */
.page{display:none}.page.active{display:block}
.call-page{display:none}.call-page.active{display:flex}
</style>
</head>
<body>
<div class="app">
    <div class="topbar">
        <h1><b>Claw</b>vatar</h1>
        <nav>
            <a class="active" onclick="showPage('dashboard')">Dashboard</a>
            <a onclick="showPage('settings')">Settings</a>
        </nav>
        <div class="spacer"></div>
        <span id="pOc" class="pill off">OpenClaw</span>
    </div>

    <!-- Dashboard -->
    <div class="content page active" id="page-dashboard">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
            <h2 style="font-size:16px">Agents</h2>
            <button class="btn btn-accent btn-sm" onclick="syncAgents()">Sync from OpenClaw</button>
        </div>
        <div class="agent-grid" id="agentGrid">
            <div class="card" style="text-align:center;color:var(--muted);padding:40px">
                Configure OpenClaw in Settings to discover agents.
            </div>
        </div>

        <h2 style="font-size:16px;margin:24px 0 12px">Avatars</h2>
        <div style="display:flex;gap:12px;flex-wrap:wrap" id="avatarGrid"></div>
        <div class="upload-zone" style="margin-top:8px;max-width:300px" onclick="document.getElementById('avatarUpload').click()">
            Upload .vrm avatar
        </div>
        <input type="file" id="avatarUpload" accept=".vrm,.glb">
    </div>

    <!-- Settings -->
    <div class="content page" id="page-settings">
        <div class="card" style="max-width:500px">
            <h2>LiveKit</h2>
            <div class="field"><label>URL</label><input id="s_livekit_url" placeholder="wss://your-project.livekit.cloud"></div>
            <div class="field"><label>API Key</label><input id="s_livekit_api_key" placeholder="API..."></div>
            <div class="field"><label>API Secret</label><input id="s_livekit_api_secret" type="password" placeholder="secret..."></div>
        </div>
        <div class="card" style="max-width:500px">
            <h2>LLM Provider</h2>
            <div class="field"><label>Google (Gemini) API Key</label><input id="s_google_api_key" placeholder="AIza..."></div>
            <div class="field"><label>OpenAI API Key (optional)</label><input id="s_openai_api_key" placeholder="sk-..."></div>
        </div>
        <div class="card" style="max-width:500px">
            <h2>OpenClaw</h2>
            <div class="field"><label>Gateway URL</label><input id="s_openclaw_url" placeholder="ws://localhost:18789/ws"></div>
            <div class="field"><label>Token</label><input id="s_openclaw_token" type="password" placeholder="gateway auth token"></div>
            <div class="field"><label>Base Path</label><input id="s_openclaw_base" placeholder="~/.openclaw (for SOUL.md files)"></div>
        </div>
        <button class="btn btn-accent" onclick="saveSettings()">Save Settings</button>
        <button class="btn btn-green" onclick="testOpenClaw()" style="margin-left:8px">Test OpenClaw Connection</button>
        <div id="settingsMsg" style="margin-top:8px;font-size:11px"></div>
    </div>

    <!-- Call Screen (hidden, shown when call starts) -->
    <div class="call-page" id="page-call">
        <div class="call-viewport">
            <canvas id="c"></canvas>
            <div class="hud"><b>FPS</b> <span id="hFps">0</span> <b>Viseme</b> <span id="hVis">-</span></div>
            <div style="position:absolute;top:8px;right:8px;display:flex;gap:6px;align-items:center;background:rgba(0,0,0,.55);padding:6px 8px;border-radius:8px">
                <span style="font-size:10px;color:#888">BG</span>
                <button class="bg-swatch" data-bg="room" style="width:22px;height:22px;border-radius:4px;border:1px solid #555;cursor:pointer;background:linear-gradient(135deg,#e8ddc8 50%,#8B6F47 50%)" title="3D Room"></button>
                <button class="bg-swatch" data-bg="#0a0a12" style="width:22px;height:22px;border-radius:4px;border:1px solid #333;cursor:pointer;background:#0a0a12" title="Dark"></button>
                <button class="bg-swatch" data-bg="#1a1520" style="width:22px;height:22px;border-radius:4px;border:1px solid #333;cursor:pointer;background:#1a1520" title="Purple"></button>
                <button class="bg-swatch" data-bg="#152a3a" style="width:22px;height:22px;border-radius:4px;border:1px solid #333;cursor:pointer;background:#152a3a" title="Blue"></button>
                <button class="bg-swatch" data-bg="#1a2a1a" style="width:22px;height:22px;border-radius:4px;border:1px solid #333;cursor:pointer;background:#1a2a1a" title="Green"></button>
                <button class="bg-swatch" data-bg="#2a1a1a" style="width:22px;height:22px;border-radius:4px;border:1px solid #333;cursor:pointer;background:#2a1a1a" title="Warm"></button>
                <button class="bg-swatch" data-bg="gradient" style="width:22px;height:22px;border-radius:4px;border:1px solid #333;cursor:pointer;background:linear-gradient(135deg,#7c6ef0,#60a5fa)" title="Gradient"></button>
                <button class="bg-swatch" data-bg="office" style="width:22px;height:22px;border-radius:4px;border:1px solid #333;cursor:pointer;background:linear-gradient(180deg,#d4d0c8 50%,#8a8780 50%)" title="Office"></button>
                <button onclick="document.getElementById('bgImage').click()" style="width:22px;height:22px;border-radius:4px;border:1px solid #333;cursor:pointer;background:#222;color:#aaa;font-size:11px" title="Upload image">📷</button>
                <input type="file" id="bgImage" accept="image/*" style="display:none">
                <span style="width:1px;height:18px;background:#333;margin:0 4px"></span>
                <button id="cineBtn" onclick="toggleCinematic()" style="padding:2px 8px;border-radius:4px;border:1px solid #555;cursor:pointer;background:#7c6ef0;color:#fff;font-size:10px" title="Toggle cinematic camera">🎬 Auto</button>
            </div>
        </div>
        <div class="call-sidebar">
            <div class="call-info">
                <h3 id="callAgentName">Agent</h3>
                <div class="meta" id="callMeta">Ready</div>
            </div>
            <div class="transcript" id="transcript"></div>
            <div class="call-controls">
                <button class="cbtn mic" id="btnMic" onclick="toggleMic()">
                    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                </button>
                <button class="cbtn end" onclick="endCall()">
                    <svg viewBox="0 0 24 24"><path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08a.956.956 0 01-.29-.7c0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28a11.27 11.27 0 00-2.67-1.85.996.996 0 01-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- LiveKit SDK -->
<script src="https://cdn.jsdelivr.net/npm/livekit-client@2.9.1/dist/livekit-client.umd.js"></script>

<!-- Three.js -->

{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
let VLP;try{VLP=(await import('https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.1.1/lib/three-vrm.module.min.js')).VRMLoaderPlugin;}catch(e){}

const cv=document.getElementById('c');
const R=new THREE.WebGLRenderer({canvas:cv,antialias:true});
R.setPixelRatio(Math.min(devicePixelRatio,2));R.outputColorSpace=THREE.SRGBColorSpace;R.toneMapping=THREE.ACESFilmicToneMapping;
R.shadowMap.enabled=true;R.shadowMap.type=THREE.PCFSoftShadowMap;
const scene=new THREE.Scene();scene.background=new THREE.Color(0x0a0a12);

// Front-facing camera (looking AT the avatar from the front)
const cam=new THREE.PerspectiveCamera(28,1,.01,100);
cam.position.set(0,1.5,1.8);  // in front, eye level
const ctrl=new OrbitControls(cam,cv);
ctrl.target.set(0,1.4,0);  // looking at face
ctrl.enableDamping=true;
ctrl.minDistance=1.0;ctrl.maxDistance=4.0;
ctrl.minPolarAngle=Math.PI*0.25;ctrl.maxPolarAngle=Math.PI*0.65;  // limit vertical
ctrl.enabled=false; // start in cinematic mode
ctrl.update();

// === 3D Room ===
const roomGroup=new THREE.Group();
const ROOM_W=6, ROOM_D=4, ROOM_H=3;

// Floor — wood texture (procedural)
function makeWoodTexture(){
    const c=document.createElement('canvas');c.width=512;c.height=512;
    const x=c.getContext('2d');
    const g=x.createLinearGradient(0,0,0,512);g.addColorStop(0,'#8B6F47');g.addColorStop(1,'#6B5537');
    x.fillStyle=g;x.fillRect(0,0,512,512);
    // Wood planks
    for(let i=0;i<8;i++){
        x.fillStyle='rgba(0,0,0,0.15)';x.fillRect(0,i*64,512,1);
        for(let j=0;j<5;j++){
            x.fillStyle='rgba(0,0,0,0.08)';x.fillRect(j*100+(i%2)*50,i*64,1,64);
        }
    }
    // Grain
    x.fillStyle='rgba(255,255,255,0.04)';
    for(let i=0;i<200;i++)x.fillRect(Math.random()*512,Math.random()*512,Math.random()*30,1);
    const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(2,2);t.colorSpace=THREE.SRGBColorSpace;return t;
}
const floorMat=new THREE.MeshStandardMaterial({map:makeWoodTexture(),roughness:0.7});
const floor=new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W,ROOM_D),floorMat);
floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;roomGroup.add(floor);

// Walls — soft warm color
const wallMat=new THREE.MeshStandardMaterial({color:0xe8ddc8,roughness:0.95});
const wallBack=new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W,ROOM_H),wallMat);
wallBack.position.set(0,ROOM_H/2,-ROOM_D/2);wallBack.receiveShadow=true;roomGroup.add(wallBack);

const wallLeft=new THREE.Mesh(new THREE.PlaneGeometry(ROOM_D,ROOM_H),wallMat);
wallLeft.position.set(-ROOM_W/2,ROOM_H/2,0);wallLeft.rotation.y=Math.PI/2;wallLeft.receiveShadow=true;roomGroup.add(wallLeft);

const wallRight=new THREE.Mesh(new THREE.PlaneGeometry(ROOM_D,ROOM_H),wallMat);
wallRight.position.set(ROOM_W/2,ROOM_H/2,0);wallRight.rotation.y=-Math.PI/2;wallRight.receiveShadow=true;roomGroup.add(wallRight);

// Ceiling
const ceilMat=new THREE.MeshStandardMaterial({color:0xf5f0e8,roughness:0.9});
const ceiling=new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W,ROOM_D),ceilMat);
ceiling.rotation.x=Math.PI/2;ceiling.position.y=ROOM_H;roomGroup.add(ceiling);

// Window on back wall (with sky view)
function makeSkyTexture(){
    const c=document.createElement('canvas');c.width=256;c.height=256;
    const x=c.getContext('2d');
    const g=x.createLinearGradient(0,0,0,256);g.addColorStop(0,'#a8c8e8');g.addColorStop(0.6,'#d4e4f4');g.addColorStop(1,'#f0e8d4');
    x.fillStyle=g;x.fillRect(0,0,256,256);
    // Clouds
    x.fillStyle='rgba(255,255,255,0.6)';
    [(40,80,30),(120,60,40),(180,90,25),(60,140,35)].forEach?null:0;
    [[40,80,30],[120,60,40],[180,90,25],[60,140,35]].forEach(c=>{x.beginPath();x.arc(c[0],c[1],c[2],0,Math.PI*2);x.fill();});
    return new THREE.CanvasTexture(c);
}
const windowFrame=new THREE.Mesh(new THREE.BoxGeometry(1.6,1.2,0.05),new THREE.MeshStandardMaterial({color:0x4a3a2a}));
windowFrame.position.set(0,1.7,-ROOM_D/2+0.03);roomGroup.add(windowFrame);
const windowGlass=new THREE.Mesh(new THREE.PlaneGeometry(1.5,1.1),new THREE.MeshBasicMaterial({map:makeSkyTexture()}));
windowGlass.position.set(0,1.7,-ROOM_D/2+0.06);roomGroup.add(windowGlass);
// Window cross
const wcMat=new THREE.MeshStandardMaterial({color:0x4a3a2a});
const wcv=new THREE.Mesh(new THREE.BoxGeometry(0.04,1.1,0.04),wcMat);wcv.position.set(0,1.7,-ROOM_D/2+0.07);roomGroup.add(wcv);
const wch=new THREE.Mesh(new THREE.BoxGeometry(1.5,0.04,0.04),wcMat);wch.position.set(0,1.7,-ROOM_D/2+0.07);roomGroup.add(wch);

// Plant in corner
const potMat=new THREE.MeshStandardMaterial({color:0x6a4a2a,roughness:0.8});
const pot=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.15,0.3,16),potMat);
pot.position.set(-2.3,0.15,-1.5);pot.castShadow=true;roomGroup.add(pot);
const leafMat=new THREE.MeshStandardMaterial({color:0x3a6a3a,roughness:0.7});
for(let i=0;i<6;i++){
    const leaf=new THREE.Mesh(new THREE.SphereGeometry(0.18,8,8),leafMat);
    const a=(i/6)*Math.PI*2;
    leaf.position.set(-2.3+Math.cos(a)*0.1,0.45+Math.sin(i)*0.15,-1.5+Math.sin(a)*0.1);
    leaf.scale.set(1,1.3,1);leaf.castShadow=true;roomGroup.add(leaf);
}

// Desk behind avatar
const deskTopMat=new THREE.MeshStandardMaterial({color:0x8B6F47,roughness:0.5});
const deskTop=new THREE.Mesh(new THREE.BoxGeometry(2.5,0.05,0.7),deskTopMat);
deskTop.position.set(0,0.75,-1.6);deskTop.castShadow=true;deskTop.receiveShadow=true;roomGroup.add(deskTop);
const legMat=new THREE.MeshStandardMaterial({color:0x4a3a2a,roughness:0.6});
[[-1.15,-1.3],[1.15,-1.3],[-1.15,-1.9],[1.15,-1.9]].forEach(p=>{
    const leg=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.75,0.06),legMat);
    leg.position.set(p[0],0.375,p[1]);leg.castShadow=true;roomGroup.add(leg);
});
// Lamp on desk
const lampBase=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.15,0.05,16),new THREE.MeshStandardMaterial({color:0x222}));
lampBase.position.set(0.9,0.78,-1.6);roomGroup.add(lampBase);
const lampShade=new THREE.Mesh(new THREE.ConeGeometry(0.15,0.25,16,1,true),new THREE.MeshStandardMaterial({color:0xfff5dc,emissive:0xfff5dc,emissiveIntensity:0.4,side:THREE.DoubleSide}));
lampShade.position.set(0.9,1.1,-1.6);lampShade.rotation.x=Math.PI;roomGroup.add(lampShade);

// Frame on wall
const frame=new THREE.Mesh(new THREE.PlaneGeometry(0.6,0.4),new THREE.MeshStandardMaterial({color:0x4a3a2a}));
frame.position.set(-1.8,2.0,-ROOM_D/2+0.02);roomGroup.add(frame);
const frameInner=new THREE.Mesh(new THREE.PlaneGeometry(0.5,0.3),new THREE.MeshStandardMaterial({color:0xc8b890}));
frameInner.position.set(-1.8,2.0,-ROOM_D/2+0.025);roomGroup.add(frameInner);

// === Foreground Desk with Laptop (user's POV) ===
const fgDesk=new THREE.Mesh(new THREE.BoxGeometry(1.6,0.04,0.6),deskTopMat);
fgDesk.position.set(0,0.75,1.3);fgDesk.castShadow=true;fgDesk.receiveShadow=true;roomGroup.add(fgDesk);
[[-0.7,1.0],[0.7,1.0],[-0.7,1.6],[0.7,1.6]].forEach(p=>{
    const leg=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.75,0.05),legMat);
    leg.position.set(p[0],0.375,p[1]);leg.castShadow=true;roomGroup.add(leg);
});

// Laptop
const laptopGroup=new THREE.Group();
laptopGroup.position.set(0,0.77,1.2); // on foreground desk
// Laptop base
const laptopBase=new THREE.Mesh(new THREE.BoxGeometry(0.36,0.018,0.26),
    new THREE.MeshStandardMaterial({color:0x2a2a32,roughness:0.4,metalness:0.6}));
laptopBase.position.y=0.009;laptopBase.castShadow=true;laptopBase.receiveShadow=true;laptopGroup.add(laptopBase);
// Keyboard (darker inset)
const keyboard=new THREE.Mesh(new THREE.BoxGeometry(0.32,0.002,0.15),new THREE.MeshStandardMaterial({color:0x1a1a22}));
keyboard.position.set(0,0.019,0.03);laptopGroup.add(keyboard);
// Trackpad
const trackpad=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.001,0.08),new THREE.MeshStandardMaterial({color:0x3a3a42}));
trackpad.position.set(0,0.02,-0.08);laptopGroup.add(trackpad);
// Screen (hinged back, tilted slightly forward for the viewer)
const screenHinge=new THREE.Group();
screenHinge.position.set(0,0.018,0.13);
screenHinge.rotation.x=-Math.PI*0.45; // tilted back, facing avatar
laptopGroup.add(screenHinge);

// Helper: compute laptop's camera world position + look direction
// Laptop camera is at laptopGroup.position + hinge offset, looking toward -Z (avatar)
function getLaptopCameraWorldPose(){
    // Camera dot world position
    const dotWorld=new THREE.Vector3();
    laptopCam.getWorldPosition(dotWorld);
    // Screen faces avatar — screen normal in world space
    const fwd=new THREE.Vector3(0,0,1);
    screenHinge.getWorldDirection(fwd);
    fwd.negate(); // camera looks opposite of screen normal direction
    return {pos:dotWorld, forward:fwd};
}

let vrm=null,clk=new THREE.Clock(),curW={},tgtW={},curH={y:0,p:0,r:0},tgtH={y:0,p:0,r:0},hb=null;
const NM={'blendShape2.mouth_a':'aa','blendShape2.mouth_i':'ih','blendShape2.mouth_u':'ou','blendShape2.mouth_e':'ee','blendShape2.mouth_o':'oh','blendShape2.Blink_L':'blinkLeft','blendShape2.Blink_R':'blinkRight','blendShape2.happy':'happy','blendShape2.angry':'angry','blendShape2.sorrow':'sad','blendShape2.joy':'surprised','happy':'happy','sad':'sad','relaxed':'relaxed','surprised':'surprised','blinkLeft':'blinkLeft','blinkRight':'blinkRight'};
function lerp(a,b,t){return a+(b-a)*t}
let fc=0,ft=performance.now();

    for(const k of new Set([...Object.keys(curW),...Object.keys(tgtW)])){const c=curW[k]||0,t=tgtW[k]||0,v=lerp(c,t,.25);if(v>.003)curW[k]=v;else delete curW[k];}
    curH.y=lerp(curH.y,tgtH.y,.12);curH.p=lerp(curH.p,tgtH.p,.12);curH.r=lerp(curH.r,tgtH.r,.12);
    if(vrm){const em=vrm.expressionManager;if(em){for(const n of Object.keys(em.expressionMap))try{em.setValue(n,0)}catch(e){}for(const[k,v] of Object.entries(curW))try{em.setValue(NM[k]||k,Math.min(1,v))}catch(e){}}if(hb){hb.rotation.y=curH.y*Math.PI/180;hb.rotation.x=curH.p*Math.PI/180;hb.rotation.z=curH.r*Math.PI/180;}vrm.update(dt);}
    R.render(scene,cam);fc++;if(performance.now()-ft>=1e3){document.getElementById('hFps').textContent=fc;fc=0;ft=performance.now();}

// --- Background management ---
function makeGradientTexture(c1,c2){
    const cv=document.createElement('canvas');cv.width=512;cv.height=512;
    const ctx=cv.getContext('2d');
    const g=ctx.createLinearGradient(0,0,512,512);
    g.addColorStop(0,c1);g.addColorStop(1,c2);
    ctx.fillStyle=g;ctx.fillRect(0,0,512,512);
    const tex=new THREE.CanvasTexture(cv);tex.colorSpace=THREE.SRGBColorSpace;return tex;
}
function makeOfficeTexture(){
    const cv=document.createElement('canvas');cv.width=1024;cv.height=1024;
    const ctx=cv.getContext('2d');
    // Wall
    const g=ctx.createLinearGradient(0,0,0,600);g.addColorStop(0,'#e8e4dc');g.addColorStop(1,'#d4d0c8');
    ctx.fillStyle=g;ctx.fillRect(0,0,1024,600);
    // Floor
    const g2=ctx.createLinearGradient(0,600,0,1024);g2.addColorStop(0,'#8a8780');g2.addColorStop(1,'#5a5850');
    ctx.fillStyle=g2;ctx.fillRect(0,600,1024,1024);
    // Window on wall
    ctx.fillStyle='#a8c8e8';ctx.fillRect(200,150,350,300);
    ctx.strokeStyle='#666';ctx.lineWidth=3;ctx.strokeRect(200,150,350,300);
    ctx.beginPath();ctx.moveTo(375,150);ctx.lineTo(375,450);ctx.moveTo(200,300);ctx.lineTo(550,300);ctx.stroke();
    // Plant
    ctx.fillStyle='#2a4a2a';ctx.beginPath();ctx.arc(800,450,80,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#6a4a2a';ctx.fillRect(770,500,60,80);
    const tex=new THREE.CanvasTexture(cv);tex.colorSpace=THREE.SRGBColorSpace;return tex;
}

window.loadAvatar=async function(path){
    if(vrm){scene.remove(vrm.scene);vrm=null;hb=null;}

        const g=await ldr.loadAsync(path);vrm=g.userData.vrm;

        // Auto-fit: scale avatar to standard 1.7m height, position feet on floor
        const TARGET_HEIGHT=1.7;
        vrm.scene.updateMatrixWorld(true);
        const bb=new THREE.Box3().setFromObject(vrm.scene);
        const size=new THREE.Vector3();bb.getSize(size);
        const center=new THREE.Vector3();bb.getCenter(center);
        const currentHeight=size.y;
        if(currentHeight>0.01){
            const scale=TARGET_HEIGHT/currentHeight;
            vrm.scene.scale.setScalar(scale);
            vrm.scene.updateMatrixWorld(true);
            // Recompute bounds after scaling
            bb.setFromObject(vrm.scene);
            bb.getSize(size);bb.getCenter(center);
        }
        // Position so feet touch floor (y=0) and centered on x,z=0,-0.4
        vrm.scene.position.set(-center.x,-bb.min.y,-0.4);
        // Face camera (VRM faces -Z by default)
        vrm.scene.rotation.y=Math.PI;
        vrm.scene.traverse(function(o){if(o.isMesh){o.castShadow=true;}});
        // Frame camera on face (head is roughly 90% of total height)
        const eyeHeight=size.y*0.92;
        cam.position.set(0,eyeHeight,1.6);ctrl.target.set(0,eyeHeight-0.05,0);ctrl.update();
        try{const h=vrm.humanoid;if(h){const la=h.getNormalizedBoneNode('leftUpperArm'),ra=h.getNormalizedBoneNode('rightUpperArm');if(la)la.rotation.z=1.2;if(ra)ra.rotation.z=-1.2;hb=h.getNormalizedBoneNode('head');}}catch(e){}}
    }catch(e){console.error('Avatar load error:',e);}
};
window.setAnimTarget=function(w,h){tgtW=w;tgtH=h;};

// === Cinematic Camera + Avatar Movement ===
let cinematicMode=true;
let isSpeaking=false, walkPhase=0, walkPath=[], pathIdx=0;
let camMode='wide'; // 'wide' | 'closeup' | 'side'
let camTargetPos=new THREE.Vector3(0,1.5,1.6);
let camTargetLook=new THREE.Vector3(0,1.4,0);
let lastSpeakChange=0;

// Walk waypoints in the room (avatar wanders here when idle)
// Avatar stays in the back half of the room (away from foreground laptop desk)
walkPath=[
    {x:0, z:-0.6, look:0},
    {x:-1.0, z:-0.8, look:Math.PI*0.2},
    {x:1.0, z:-0.7, look:-Math.PI*0.15},
    {x:0, z:-0.3, look:0},
    {x:-0.6, z:-0.5, look:Math.PI*0.1},
];

function pickCameraShot(speaking){
    if(speaking){
        // Speaking — camera transitions TO laptop webcam POV
        // We return special mode that updateScene handles dynamically
        return {mode:'laptop', pos:null, look:null};
    } else {
        // Idle — wider shots showing the room with laptop in foreground
        const shots=[
            {mode:'wide', pos:new THREE.Vector3(0, 1.7, 3.0), look:new THREE.Vector3(0, 1.2, 0)},
            {mode:'side', pos:new THREE.Vector3(2.2, 1.6, 1.8), look:new THREE.Vector3(0, 1.2, 0)},
            {mode:'side', pos:new THREE.Vector3(-2.2, 1.6, 1.8), look:new THREE.Vector3(0, 1.2, 0)},
            {mode:'wide', pos:new THREE.Vector3(1.0, 1.8, 2.8), look:new THREE.Vector3(0, 1.2, 0)},
            {mode:'wide', pos:new THREE.Vector3(-1.0, 1.8, 2.8), look:new THREE.Vector3(0, 1.2, 0)},
        ];
        return shots[Math.floor(Math.random()*shots.length)];
    }
}

function setSpeakingState(speaking){
    if(speaking===isSpeaking)return;
    isSpeaking=speaking;
    const now=performance.now();
    if(now-lastSpeakChange<300)return; // quick debounce
    lastSpeakChange=now;
    const shot=pickCameraShot(speaking);
    camMode=shot.mode;
    if(shot.pos)camTargetPos.copy(shot.pos);
    if(shot.look)camTargetLook.copy(shot.look);
}

// Periodically change camera angle when idle (laptop mode stays fixed when speaking)
setInterval(function(){
    if(!vrm || isSpeaking)return;
    const shot=pickCameraShot(false);
    if(shot.pos)camTargetPos.copy(shot.pos);
    if(shot.look)camTargetLook.copy(shot.look);
    camMode=shot.mode;
}, 10000);

// Avatar walking and camera updates per frame
const _camPos=new THREE.Vector3(), _camLook=new THREE.Vector3();
let _walkTime=0, _walkTarget={x:0, z:-0.4, look:0}, _walkActive=false;

window.toggleCinematic=function(){
    cinematicMode=!cinematicMode;
    const btn=document.getElementById('cineBtn');
    if(cinematicMode){btn.style.background='#7c6ef0';btn.textContent='🎬 Auto';ctrl.enabled=false;}
    else{btn.style.background='#333';btn.textContent='🖱 Manual';ctrl.enabled=true;}
};

function updateScene(dt){
    if(!vrm)return;
    if(!cinematicMode)return; // user has manual control

    // ── Avatar walking (only when idle) ──
    if(!isSpeaking){
        _walkTime+=dt;
        if(_walkTime>5 || !_walkActive){
            _walkTime=0;
            pathIdx=(pathIdx+1)%walkPath.length;
            _walkTarget=walkPath[pathIdx];
            _walkActive=true;
        }
        // Move toward target
        const cx=vrm.scene.position.x, cz=vrm.scene.position.z;
        const dx=_walkTarget.x-cx, dz=_walkTarget.z-cz;
        const dist=Math.sqrt(dx*dx+dz*dz);
        if(dist>0.05){
            const speed=0.3*dt;
            vrm.scene.position.x+=dx/dist*speed;
            vrm.scene.position.z+=dz/dist*speed;
            // Face walking direction
            const targetRot=Math.atan2(dx,dz)+Math.PI;
            const curRot=vrm.scene.rotation.y;
            let rotDiff=targetRot-curRot;
            while(rotDiff>Math.PI)rotDiff-=Math.PI*2;
            while(rotDiff<-Math.PI)rotDiff+=Math.PI*2;
            vrm.scene.rotation.y+=rotDiff*0.05;
            // Walking animation: subtle vertical bob
            walkPhase+=dt*8;
            vrm.scene.position.y=Math.abs(Math.sin(walkPhase))*0.04;
        } else {
            // Arrived — face camera angle from waypoint
            const targetRot=Math.PI+_walkTarget.look;
            vrm.scene.rotation.y+=(targetRot-vrm.scene.rotation.y)*0.05;
            vrm.scene.position.y*=0.9; // settle
        }
    } else {
        // When speaking: always face the camera (fast, smooth)
        const camDir=Math.atan2(cam.position.x-vrm.scene.position.x, cam.position.z-vrm.scene.position.z);
        let diff=camDir-vrm.scene.rotation.y;
        while(diff>Math.PI)diff-=Math.PI*2;
        while(diff<-Math.PI)diff+=Math.PI*2;
        vrm.scene.rotation.y+=diff*0.25; // much faster — 0.08 → 0.25
        vrm.scene.position.y*=0.85;
    }

    // ── Cinematic camera (smooth follow) ──
    const avPos=vrm.scene.position;

    if(camMode==='laptop'){
        // Laptop webcam POV — position camera a bit back from laptop for wider framing
        const lcam=getLaptopCameraWorldPose();
        // Pull camera slightly back and up from the laptop cam dot
        _camPos.copy(lcam.pos);
        _camPos.z+=0.3; // back toward viewer side
        _camPos.y+=0.05;
        // Look at avatar's upper chest (shows face + shoulders, not too close)
        _camLook.set(avPos.x, 1.35, avPos.z);
        cam.position.lerp(_camPos, 0.15); // fast smooth transition
        ctrl.target.lerp(_camLook, 0.18);
    } else {
        // Normal cinematic shot — relative to avatar position
        _camPos.set(avPos.x+camTargetPos.x, camTargetPos.y, avPos.z+camTargetPos.z);
        _camLook.set(avPos.x+camTargetLook.x, camTargetLook.y, avPos.z+camTargetLook.z);
        cam.position.lerp(_camPos, 0.08); // was 0.04 — faster
        ctrl.target.lerp(_camLook, 0.1);
    }
}
</script>

<script>
// ===================== APP LOGIC =====================
var animWs=null,lkRoom=null,micOn=true,currentAgent=null;

// --- Pages ---
function showPage(name){
    document.querySelectorAll('.page,.call-page').forEach(function(p){p.classList.remove('active')});
    document.getElementById('page-'+name).classList.add('active');
    document.querySelectorAll('nav a').forEach(function(a){a.classList.toggle('active',a.textContent.toLowerCase()===name)});
    if(name==='call')window.resizeRenderer();
}

// --- API helpers ---
async function api(method,path,body){
    var opts={method:method,headers:{'Content-Type':'application/json'}};
    if(body)opts.body=JSON.stringify(body);
    var r=await fetch(path,opts);
    return r.json();
}

// --- Settings ---
async function loadSettings(){
    var d=await api('GET','/api/settings');
    var s=d.settings||{};
    document.getElementById('s_livekit_url').value=s.livekit_url||'';
    document.getElementById('s_livekit_api_key').value=s.livekit_api_key||'';
    document.getElementById('s_openclaw_url').value=s.openclaw_url||'';
    document.getElementById('s_openclaw_base').value=s.openclaw_base||'~/.openclaw';
    // Don't show masked secrets in inputs
    updateOcPill(d);
}
async function saveSettings(){
    var body={};
    ['livekit_url','livekit_api_key','livekit_api_secret','google_api_key','openai_api_key','openclaw_url','openclaw_token','openclaw_base'].forEach(function(k){
        var el=document.getElementById('s_'+k);
        if(el&&el.value&&!el.value.includes('...'))body[k]=el.value;
    });
    var d=await api('POST','/api/settings',body);
    document.getElementById('settingsMsg').textContent=d.ok?'Saved!':'Error: '+(d.error||'unknown');
    document.getElementById('settingsMsg').style.color=d.ok?'var(--green)':'var(--red)';
}
async function testOpenClaw(){
    document.getElementById('settingsMsg').textContent='Connecting...';
    var d=await api('POST','/api/openclaw/connect');
    document.getElementById('settingsMsg').textContent=d.ok?'Connected! '+d.agents+' agents synced.':'Error: '+(d.error||'failed');
    document.getElementById('settingsMsg').style.color=d.ok?'var(--green)':'var(--red)';
    if(d.ok){loadAgents();updateOcPill({connected:true});}
}
function updateOcPill(d){
    var p=document.getElementById('pOc');
    if(d&&d.connected){p.className='pill on';p.textContent='OpenClaw';}
}

// --- Agents ---
var _avatarsList=[];
async function loadAgents(){
    var d=await api('GET','/api/agents');
    var avd=await api('GET','/api/avatars');
    _avatarsList=avd.avatars||[];
    var grid=document.getElementById('agentGrid');
    var agents=d.agents||[];
    if(d.error){grid.innerHTML='<div class="card" style="text-align:center;color:var(--muted);padding:40px">'+d.error+'</div>';return;}
    if(!agents.length){grid.innerHTML='<div class="card" style="text-align:center;color:var(--muted);padding:40px">No agents found. Connect to OpenClaw in Settings first.</div>';return;}
    grid.innerHTML='';
    agents.forEach(function(a){
        var div=document.createElement('div');
        div.className='agent-card';

        // Avatar select dropdown
        var opts='<option value="">No avatar</option>';
        _avatarsList.forEach(function(av){
            var sel=av.id===a.avatar_id?' selected':'';
            opts+='<option value="'+av.id+'"'+sel+'>'+av.name+'</option>';
        });

        div.innerHTML=
            '<div class="avatar-badge">'+(a.avatar_name?a.avatar_name[0].toUpperCase():'👤')+'</div>'
            +'<h3>'+a.id+'</h3>'
            +'<div class="meta">'
            +(a.has_soul?'✓ SOUL.md':'✗ No SOUL.md')+'<br>'
            +(a.model||'—')
            +'</div>'
            +'<div style="margin-top:8px">'
            +'<select onchange="assignAvatar(\''+a.id+'\',this.value)" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:4px;color:var(--text);font-size:10px">'
            +opts+'</select>'
            +'</div>'
            +'<button class="btn btn-accent btn-sm" style="margin-top:6px;width:100%" onclick="event.stopPropagation();startCall(\''+a.id+'\')">Call</button>';
        grid.appendChild(div);
    });
}
async function assignAvatar(agentId,avatarId){
    await api('POST','/api/agents/'+agentId+'/assign-avatar',{avatar_id:avatarId});
    loadAgents();
}
async function syncAgents(){
    var d=await api('POST','/api/openclaw/connect');

document.getElementById('avatarUpload').onchange=async function(){
    if(!this.files.length)return;
    var f=this.files[0],fd=new FormData();fd.append('file',f);
    var d=await(await fetch('/api/avatars/upload',{method:'POST',body:fd})).json();
    if(d.avatar_id){loadAvatars();alert('Avatar uploaded: '+d.name);}

};

// --- Call ---
async function startCall(agentId){
    currentAgent=agentId;
    document.getElementById('callAgentName').textContent=agentId;
    document.getElementById('callMeta').textContent='Connecting...';
    document.getElementById('transcript').innerHTML='';
    showPage('call');
    setTimeout(function(){window.resizeRenderer();},100);

    // Load assigned avatar
    var avInfo=await api('GET','/api/agents/'+agentId+'/avatar');
    if(avInfo&&avInfo.file_path){
        // Upload as blob URL for Three.js
        try{
            var resp=await fetch('/api/avatars/'+avInfo.avatar_id+'/file');
            if(resp.ok){
                var blob=await resp.blob();
                window.loadAvatar(URL.createObjectURL(blob));
                addTranscript('Avatar loaded: '+avInfo.name,'sys');
            }
        }catch(e){}
    }

    // Connect animation WebSocket
    connectAnimWs();

    // Get LiveKit token and join room
    var tok=await api('GET','/api/token?agent_id='+agentId);
    if(tok.error){addTranscript('Error: '+tok.error,'sys');return;}

    try{
        lkRoom=new LivekitClient.Room({adaptiveStream:true,dynacast:true});
        lkRoom.on(LivekitClient.RoomEvent.TrackSubscribed,function(track,pub,p){
            if(track.kind==='audio'){
                var el=track.attach();el.style.display='none';document.body.appendChild(el);
                captureAgentAudio(track);
                addTranscript('Agent connected','sys');
                document.getElementById('callMeta').textContent='In call';
            }
        });
        lkRoom.on(LivekitClient.RoomEvent.Disconnected,function(){
            document.getElementById('callMeta').textContent='Disconnected';
        });

        await lkRoom.connect(tok.url,tok.token);
        await lkRoom.localParticipant.setMicrophoneEnabled(true);
        micOn=true;
        addTranscript('Connected to room: '+tok.room,'sys');
        document.getElementById('callMeta').textContent='Waiting for agent...';
    }catch(e){addTranscript('Join error: '+e.message,'sys');}
}

function endCall(){
    if(lkRoom){lkRoom.disconnect();lkRoom=null;}
    if(animWs){animWs.close();animWs=null;}
    showPage('dashboard');
}

function toggleMic(){
    if(!lkRoom)return;
    micOn=!micOn;
    lkRoom.localParticipant.setMicrophoneEnabled(micOn);
    document.getElementById('btnMic').classList.toggle('muted',!micOn);
}

function addTranscript(text,type){
    var d=document.createElement('div');d.className='msg '+(type||'agent');d.textContent=text;
    var t=document.getElementById('transcript');t.appendChild(d);t.scrollTop=99999;
}

// --- Animation WebSocket ---
function connectAnimWs(){
    var p=location.protocol==='https:'?'wss:':'ws:';
    animWs=new WebSocket(p+'//'+location.host+'/ws/animation');
    animWs.onmessage=function(e){
        try{var m=JSON.parse(e.data);
        if(m.type==='weights'||m.weights){
            var w=m.weights||{},h=m.head||{};
            window.setAnimTarget(w,{y:h.yaw||0,p:h.pitch||0,r:h.roll||0});
            if(m.viseme)document.getElementById('hVis').textContent=m.viseme;
            // Drive cinematic camera based on speaking state
            if(typeof setSpeakingState==='function')setSpeakingState(!!m.is_speaking);
        }}catch(err){}
    };
    animWs.onclose=function(){setTimeout(connectAnimWs,3000);};
    setInterval(function(){if(animWs&&animWs.readyState===1)animWs.send(JSON.stringify({type:'ping'}));},15000);
}

// --- Capture agent audio for lip-sync ---
function captureAgentAudio(track){
    var stream=new MediaStream([track.mediaStreamTrack]);
    var ctx=new AudioContext();var src=ctx.createMediaStreamSource(stream);
    var proc=ctx.createScriptProcessor(4096,1,1);
    proc.onaudioprocess=function(e){
        if(!animWs||animWs.readyState!==1)return;
        var raw=e.inputBuffer.getChannelData(0);
        var ratio=ctx.sampleRate/16000,len=Math.round(raw.length/ratio),ds=new Float32Array(len);
        for(var i=0;i<len;i++){var idx=i*ratio,lo=Math.floor(idx),hi=Math.min(lo+1,raw.length-1),f=idx-lo;ds[i]=raw[lo]*(1-f)+raw[hi]*f;}
        var i16=new Int16Array(ds.length);for(var j=0;j<ds.length;j++)i16[j]=Math.max(-32768,Math.min(32767,Math.round(ds[j]*32768)));
        var bytes=new Uint8Array(i16.buffer);var bin='';for(var j=0;j<bytes.length;j++)bin+=String.fromCharCode(bytes[j]);
        animWs.send(JSON.stringify({type:'audio',data:btoa(bin),sample_rate:16000}));
    };
    src.connect(proc);proc.connect(ctx.destination);
}
